<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kub MAP — Pièce intérieure</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; }
    canvas { display: block; }
    #info {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      background: rgba(0,0,0,0.4);
      padding: 8px 18px;
      border-radius: 20px;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }
    #info strong { color: rgba(255,255,255,0.8); }
  </style>
</head>
<body>

<div id="info">🖱️ <strong>Clique</strong> pour jouer | <strong>WASD</strong> se déplacer | <strong>Shift</strong> courir | <strong>ESC</strong> libérer</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ═══════════════════════════════════════════════
//  DIMENSIONS
// ═══════════════════════════════════════════════
const W = 3;
const D = 4;
const H = 2.5;
const TILE = 0.5; // mètres par carreau de sol

// ═══════════════════════════════════════════════
//  SCÈNE / CAMÉRA / RENDU
// ═══════════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);
scene.fog = new THREE.Fog(0x222222, 6, 12);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(0, 1.70, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new PointerLockControls(camera, renderer.domElement);
renderer.domElement.addEventListener('click', () => controls.lock());

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════════
//  TEXTURES PROCÉDURALES
// ═══════════════════════════════════════════════

function makeCanvas(w, h, drawFn) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  drawFn(c.getContext('2d'), w, h);
  return c;
}

// Sol carrelé
const floorTex = new THREE.CanvasTexture(
  makeCanvas(256, 256, (ctx, w, h) => {
    ctx.fillStyle = '#c9b8a5';
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = '#a0907a';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, w - 2, h - 2);
    for (let i = 0; i < 200; i++) {
      ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.03})`;
      ctx.fillRect(Math.random() * w, Math.random() * h, Math.random() * 3 + 1, 1);
    }
  })
);
floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
floorTex.repeat.set(W / TILE, D / TILE);
floorTex.anisotropy = 8;

// Plafond blanc grainé
const ceilTex = new THREE.CanvasTexture(
  makeCanvas(128, 128, (ctx, w, h) => {
    ctx.fillStyle = '#f2efe8';
    ctx.fillRect(0, 0, w, h);
    for (let i = 0; i < 100; i++) {
      ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.015})`;
      ctx.fillRect(Math.random() * w, Math.random() * h, Math.random() * 2, Math.random() * 2);
    }
  })
);
ceilTex.wrapS = ceilTex.wrapT = THREE.RepeatWrapping;
ceilTex.repeat.set(W / 1, D / 1);
ceilTex.anisotropy = 4;

// Crépi tileable
function makePlaster(base) {
  const tex = new THREE.CanvasTexture(
    makeCanvas(128, 128, (ctx, w, h) => {
      ctx.fillStyle = base;
      ctx.fillRect(0, 0, w, h);
      for (let i = 0; i < 400; i++) {
        const x = Math.random() * w;
        const y = Math.random() * h;
        const bright = Math.random() > 0.5 ? 0.015 : -0.015;
        ctx.fillStyle = bright > 0
          ? `rgba(255,255,255,${bright})`
          : `rgba(0,0,0,${-bright})`;
        ctx.fillRect(x, y, Math.max(1, Math.random() * 4), Math.max(1, Math.random() * 4));
      }
    })
  );
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.anisotropy = 4;
  return tex;
}

// ═══════════════════════════════════════════════
//  PIÈCE (cube normales inversées)
// ═══════════════════════════════════════════════

// Mur -Z (fond) = invisible : la fenêtre montre l'extérieur
const murInvisible = new THREE.MeshStandardMaterial({
  transparent: true,
  opacity: 0,
  side: THREE.BackSide,
  depthWrite: false,
});

const wallMaterials = [
  // +x : mur droit (3m × 2.5m) — avec porte
  (() => {
    const t = makePlaster('#d4c9b8');
    t.repeat.set(H / 0.5, D / 0.5);
    return new THREE.MeshStandardMaterial({ map: t, side: THREE.BackSide, roughness: 0.85 });
  })(),
  // -x : mur gauche
  (() => {
    const t = makePlaster('#c8c0b0');
    t.repeat.set(H / 0.5, D / 0.5);
    return new THREE.MeshStandardMaterial({ map: t, side: THREE.BackSide, roughness: 0.85 });
  })(),
  // +y : plafond
  new THREE.MeshStandardMaterial({ map: ceilTex, side: THREE.BackSide, roughness: 0.9 }),
  // -y : sol
  new THREE.MeshStandardMaterial({ map: floorTex, side: THREE.BackSide, roughness: 0.6 }),
  // +z : face avant
  (() => {
    const t = makePlaster('#e0d8c8');
    t.repeat.set(W / 0.5, H / 0.5);
    return new THREE.MeshStandardMaterial({ map: t, side: THREE.BackSide, roughness: 0.85 });
  })(),
  // -z : face arrière — INVISIBLE (fenêtre)
  murInvisible,
];

const room = new THREE.Mesh(new THREE.BoxGeometry(W, H, D), wallMaterials);
room.position.y = H / 2;
room.castShadow = true;
room.receiveShadow = true;
scene.add(room);

// ═══════════════════════════════════════════════
//  PLINTHES (baseboards)
// ═══════════════════════════════════════════════
const plintheMat = new THREE.MeshStandardMaterial({ color: 0xe8e0d0, roughness: 0.7 });
const PLINTHE_H = 0.08;
const PLINTHE_D = 0.025;

function makePlinthe() {
  const g = new THREE.Group();
  const add = (x, y, z, w, h, d) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), plintheMat);
    m.position.set(x, y, z);
    g.add(m);
  };
  add(0, PLINTHE_H/2, D/2 - 0.005, W, PLINTHE_H, PLINTHE_D);   // +Z
  add(0, PLINTHE_H/2, -D/2 + 0.005, W, PLINTHE_H, PLINTHE_D);   // -Z
  add(W/2 - 0.005, PLINTHE_H/2, 0, PLINTHE_D, PLINTHE_H, D);    // +X
  add(-W/2 + 0.005, PLINTHE_H/2, 0, PLINTHE_D, PLINTHE_H, D);   // -X
  return g;
}
scene.add(makePlinthe());

// ═══════════════════════════════════════════════
//  CIMAISE
// ═══════════════════════════════════════════════
const cimaiseMat = new THREE.MeshStandardMaterial({ color: 0xb8a890, roughness: 0.5, metalness: 0.2 });
const CY = 1.10, CH = 0.08, CD = 0.03;

function makeCimaise() {
  const g = new THREE.Group();
  const add = (x, y, z, w, h, d) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), cimaiseMat);
    m.position.set(x, y, z);
    g.add(m);
  };
  add(0, CY, D/2 - 0.01, W, CH, CD);       // +Z
  add(W/2 - 0.01, CY, 0, CD, CH, D);       // +X
  add(-W/2 + 0.01, CY, 0, CD, CH, D);      // -X
  // -Z : pas de cimaise (fenêtre)
  return g;
}
scene.add(makeCimaise());

// ═══════════════════════════════════════════════
//  PORTE (mur +X)
// ═══════════════════════════════════════════════
const doorMat = new THREE.MeshStandardMaterial({ color: 0x8a7a6a, roughness: 0.6, metalness: 0.05 });
const doorFrameMat = new THREE.MeshStandardMaterial({ color: 0xf0ede8, roughness: 0.7 });
const DOOR_W = 0.85;
const DOOR_H = 2.10;
const DOOR_D = 0.04;
const doorX = W/2 - 0.01;
const doorY = DOOR_H/2;

// Panneau de porte
const doorPanel = new THREE.Mesh(new THREE.BoxGeometry(DOOR_D, DOOR_H, DOOR_W), doorMat);
doorPanel.position.set(doorX, doorY, 0.6); // décalé du centre pour coin de pièce
scene.add(doorPanel);

// Cadre (montants)
const addDoorBar = (y, z, w, h) => {
  const b = new THREE.Mesh(new THREE.BoxGeometry(DOOR_D + 0.02, h, w), doorFrameMat);
  b.position.set(doorX, y, z);
  scene.add(b);
};
addDoorBar(doorY, 0.6 - DOOR_W/2, 0.04, DOOR_H + 0.04);  // montant gauche
addDoorBar(doorY, 0.6 + DOOR_W/2, 0.04, DOOR_H + 0.04);  // montant droit
addDoorBar(doorY + DOOR_H/2, 0.6, DOOR_W + 0.04, 0.04);  // linteau

// Poignée (petite sphère)
const knob = new THREE.Mesh(
  new THREE.SphereGeometry(0.03, 8, 8),
  new THREE.MeshStandardMaterial({ color: 0xc8a050, roughness: 0.3, metalness: 0.7 })
);
knob.position.set(doorX, 1.0, 0.6 + DOOR_W/2 - 0.05);
scene.add(knob);

// ═══════════════════════════════════════════════
//  FENÊTRE + VUE EXTÉRIEURE
// ═══════════════════════════════════════════════
const FW = 1.2, FH = 1.4;
const fX = 0, fY = 1.3, fZ = -D/2 + 0.01;

// Vitre
const glassMat = new THREE.MeshStandardMaterial({
  color: 0x87ceeb,
  roughness: 0.05,
  metalness: 0.0,
  transparent: true,
  opacity: 0.35,
  side: THREE.DoubleSide,
});
const glass = new THREE.Mesh(new THREE.PlaneGeometry(FW * 0.85, FH * 0.85), glassMat);
glass.position.set(fX, fY, fZ);
scene.add(glass);

// Cadre fenêtre
function addBar(x, y, w, h) {
  const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.06), doorFrameMat);
  b.position.set(x, y, fZ);
  scene.add(b);
}
addBar(fX, fY + FH/2, FW + 0.08, 0.04);
addBar(fX, fY - FH/2, FW + 0.08, 0.04);
addBar(fX - FW/2, fY, 0.04, FH + 0.04);
addBar(fX + FW/2, fY, 0.04, FH + 0.04);
addBar(0, fY, 0.03, FH * 0.85);  // croisillon vertical
addBar(fX, fY, FW * 0.85, 0.03); // croisillon horizontal

// Vue extérieure (paysage derrière la fenêtre)
const extScene = new THREE.Scene();

// Ciel gradient
const skyCanvas = makeCanvas(512, 512, (ctx, w, h) => {
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#7ec8e3');
  grad.addColorStop(0.4, '#aad0e8');
  grad.addColorStop(0.6, '#b5dce8');
  grad.addColorStop(1, '#c8e8d8');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  // Nuages
  for (let i = 0; i < 8; i++) {
    const cx = Math.random() * w;
    const cy = Math.random() * h * 0.5;
    const r = 20 + Math.random() * 40;
    ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.random() * 0.3})`;
    ctx.beginPath();
    ctx.ellipse(cx, cy, r, r * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + r * 0.4, cy - r * 0.15, r * 0.6, r * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
  }
});
const skyTex = new THREE.CanvasTexture(skyCanvas);
const skyMat = new THREE.MeshBasicMaterial({ map: skyTex, side: THREE.DoubleSide });
const skyPlane = new THREE.Mesh(new THREE.PlaneGeometry(8, 6), skyMat);
skyPlane.position.set(0, 3, -2.5);
scene.add(skyPlane);

// Sol extérieur (pelouse)
const grassTex = new THREE.CanvasTexture(
  makeCanvas(128, 128, (ctx, w, h) => {
    ctx.fillStyle = '#5a8a4a';
    ctx.fillRect(0, 0, w, h);
    for (let i = 0; i < 500; i++) {
      const x = Math.random() * w;
      const y = Math.random() * h;
      const c = ['#4a7a3a', '#6a9a5a', '#3a6a2a', '#5a8a4a'][Math.floor(Math.random() * 4)];
      ctx.fillStyle = c;
      ctx.fillRect(x, y, 1, Math.max(1, Math.random() * 3));
    }
  })
);
grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
grassTex.repeat.set(4, 4);
const groundGeo = new THREE.PlaneGeometry(8, 6);
const groundMat = new THREE.MeshStandardMaterial({ map: grassTex, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.set(0, 0, -2.5);
ground.receiveShadow = true;
scene.add(ground);

// Arbre simple (tronc + couronne)
function makeTree(x, z) {
  const g = new THREE.Group();
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5a3a2a, roughness: 0.9 });
  const leafMat = new THREE.MeshStandardMaterial({ color: 0x3a7a2a, roughness: 0.8 });
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.08, 1.2), trunkMat);
  trunk.position.y = 0.6;
  trunk.castShadow = true;
  g.add(trunk);
  const crown = new THREE.Mesh(new THREE.SphereGeometry(0.4, 6, 6), leafMat);
  crown.position.set(0, 1.4, 0);
  crown.castShadow = true;
  g.add(crown);
  g.position.set(x, 0, z);
  return g;
}
scene.add(makeTree(-2, -2.5));
scene.add(makeTree(2.5, -2.2));
scene.add(makeTree(2, -4));
scene.add(makeTree(-2.5, -4.5));

// ═══════════════════════════════════════════════
//  ÉCLAIRAGE
// ═══════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x5a8a4a, 0.5));

// Lumière intérieure (plafonnier)
const plafonnier = new THREE.PointLight(0xffeedd, 2.5, 6);
plafonnier.position.set(0, H - 0.1, 0);
plafonnier.castShadow = true;
scene.add(plafonnier);

// Petit abat-jour
const abatJour = new THREE.Mesh(
  new THREE.ConeGeometry(0.15, 0.1, 12),
  new THREE.MeshStandardMaterial({ color: 0xf0ece0, roughness: 0.6, emissive: 0xffeedd, emissiveIntensity: 0.1 })
);
abatJour.position.set(0, H - 0.02, 0);
scene.add(abatJour);

// Soleil extérieur (DirectionalLight)
const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
sun.position.set(5, 8, -3);
sun.target.position.set(0, 0, -3);
sun.castShadow = true;
sun.shadow.mapSize.width = 1024;
sun.shadow.mapSize.height = 1024;
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 20;
sun.shadow.camera.left = -5;
sun.shadow.camera.right = 5;
sun.shadow.camera.top = 5;
sun.shadow.camera.bottom = -5;
scene.add(sun);
scene.add(sun.target);

// ═══════════════════════════════════════════════
//  MARQUEURS DIRECTIONNELS (N/S/E/O)
// ═══════════════════════════════════════════════
function makeLabel(color, label, size, pos) {
  const c = makeCanvas(128, 128, (ctx, w, h) => {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(w/2, h/2, w/2 - 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = 'bold 26px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, w/2, h/2);
  });
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false }));
  s.position.copy(pos);
  s.scale.set(size, size, 1);
  return s;
}
scene.add(makeLabel('#e06040', 'N', 0.25, new THREE.Vector3(0, 0.2, -D/2 + 0.5)));
scene.add(makeLabel('#4060e0', 'S', 0.25, new THREE.Vector3(0, 0.2, D/2 - 0.5)));
scene.add(makeLabel('#40e060', 'E', 0.25, new THREE.Vector3(W/2 - 0.5, 0.2, 0)));
scene.add(makeLabel('#e0e040', 'O', 0.25, new THREE.Vector3(-W/2 + 0.5, 0.2, 0)));

// ═══════════════════════════════════════════════
//  GRID HELPER
// ═══════════════════════════════════════════════
const grid = new THREE.GridHelper(4.5, 9, 0xffffff, 0x888888);
grid.position.y = 0.003;
scene.add(grid);

// ═══════════════════════════════════════════════
//  MOUVEMENT WASD
// ═══════════════════════════════════════════════
const keys = { w: false, a: false, s: false, d: false, shift: false };

document.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'w' || k === 'a' || k === 's' || k === 'd') keys[k] = true;
  if (e.key === 'Shift') keys.shift = true;
});
document.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'w' || k === 'a' || k === 's' || k === 'd') keys[k] = false;
  if (e.key === 'Shift') keys.shift = false;
});

const clock = new THREE.Clock();

// Collision avec les murs
function clampPos(pos) {
  const margin = 0.15;
  pos.x = Math.max(-W/2 + margin, Math.min(W/2 - margin, pos.x));
  pos.z = Math.max(-D/2 + margin, Math.min(D/2 - margin, pos.z));
  return pos;
}

// ═══════════════════════════════════════════════
//  BOUCLE D'ANIMATION
// ═══════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);

  // WASD
  if (controls.isLocked) {
    const delta = clock.getDelta();
    const speed = keys.shift ? 2.5 : 1.2;
    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
    forward.y = 0;
    right.y = 0;
    forward.normalize();
    right.normalize();

    if (keys.w) camera.position.add(forward.multiplyScalar(delta * speed));
    if (keys.s) camera.position.add(forward.clone().multiplyScalar(-delta * speed));
    if (keys.a) camera.position.add(right.clone().multiplyScalar(-delta * speed));
    if (keys.d) camera.position.add(right.clone().multiplyScalar(delta * speed));

    camera.position.y = 1.70;
    clampPos(camera.position);
  }

  renderer.render(scene, camera);
}
animate();

console.log(`🏠 Kub MAP v2 : ${W}m x ${D}m x ${H}m (${W*D}m²)`);
console.log(`   WASD + Shift pour se déplacer`);
console.log(`   Fenêtre avec vue extérieure`);
console.log(`   Porte sur mur droit (+X)`);
console.log(`   Plinthes, cimaise, ombres`);
</script>
</body>
</html>
