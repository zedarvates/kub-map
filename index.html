<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maison 3D — Plans analysés</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; }
    canvas { display: block; }
    #info {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.5); font-size: 14px; background: rgba(0,0,0,0.4);
      padding: 8px 18px; border-radius: 20px; pointer-events: none; user-select: none;
      white-space: nowrap;
    }
    #info strong { color: rgba(255,255,255,0.8); }
  </style>
</head>
<body>
<div id="info">🖱️ <strong>Clique</strong> | <strong>WASD</strong> se déplacer | <strong>Shift</strong> courir | <strong>ESC</strong> libérer</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════
//  CONFIG MAISON (extrait des plans)
// ═══════════════════════════════════════════════

// Échelle: plan 206px ≈ 8m → 1px ≈ 0.039m
const SCALE = 0.039;
const EXTERIEUR_LARGEUR = 206 * SCALE;  // ≈ 8m
const EXTERIEUR_PROFONDEUR = 272 * SCALE; // ≈ 10.6m
const HAUTEUR_ETAGE = 2.5;
const NB_ETAGES = 2;

// Murs porteurs extraits des plans (en px → mètres)
// FLOOR1 - Murs verticaux (X)
const wallsX_floor1 = [22, 52, 117, 165, 228];
// FLOOR1 - Murs horizontaux (Y, profondeur)
const wallsZ_floor1 = [36, 146, 176, 207, 265, 308];

// FLOOR2 - Murs verticaux
const wallsX_floor2 = [24, 81, 114, 137, 224];
// FLOOR2 - Murs horizontaux (Y, profondeur)
const wallsZ_floor2 = [35, 79, 146, 164, 190, 209, 240, 255, 307];

// Convert px to meters (centered on 0,0)
function pxToM(px, center, scale) {
  return (px - center) * scale;
}

const cx1 = (wallsX_floor1[0] + wallsX_floor1[wallsX_floor1.length-1]) / 2;
const cz1 = (wallsZ_floor1[0] + wallsZ_floor1[wallsZ_floor1.length-1]) / 2;

const cx2 = (wallsX_floor2[0] + wallsX_floor2[wallsX_floor2.length-1]) / 2;
const cz2 = (wallsZ_floor2[0] + wallsZ_floor2[wallsZ_floor2.length-1]) / 2;

// ═══════════════════════════════════════════════
//  SCÈNE
// ═══════════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 15, 30);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(6, 3, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.update();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════════
//  MATÉRIAUX
// ═══════════════════════════════════════════════
const murExtMat = new THREE.MeshStandardMaterial({ color: 0xd4c9b8, roughness: 0.8 });
const murIntMat = new THREE.MeshStandardMaterial({ color: 0xf0e8d8, roughness: 0.85, side: THREE.DoubleSide });
const solMat = new THREE.MeshStandardMaterial({ color: 0xc9b8a5, roughness: 0.7 });
const plafondMat = new THREE.MeshStandardMaterial({ color: 0xf2efe8, roughness: 0.9 });
const toitMat = new THREE.MeshStandardMaterial({ color: 0x6a4a2a, roughness: 0.7 });
const vitreMat = new THREE.MeshStandardMaterial({ color: 0x87ceeb, roughness: 0.05, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
const cadreMat = new THREE.MeshStandardMaterial({ color: 0xf0ede8, roughness: 0.7 });
const porteMat = new THREE.MeshStandardMaterial({ color: 0x8a7a6a, roughness: 0.6 });

// ═══════════════════════════════════════════════
//  CONSTRUCTION DES MURS
// ═══════════════════════════════════════════════

function buildWalls(wallsX, wallsZ, floorY, isFloor1) {
  const group = new THREE.Group();
  const W = EXTERIEUR_LARGEUR;
  const D = EXTERIEUR_PROFONDEUR;
  const H = HAUTEUR_ETAGE;
  const cX = (wallsX[0] + wallsX[wallsX.length-1]) / 2;
  const cZ = (wallsZ[0] + wallsZ[wallsZ.length-1]) / 2;
  const wallThick = 0.12;

  // Convert pixel position to world space
  function toX(px) { return (px - cX) * SCALE; }
  function toZ(px) { return (px - cZ) * SCALE; }

  // Exterior walls (thick)
  const extW = (wallsX[wallsX.length-1] - wallsX[0]) * SCALE;
  const extD = (wallsZ[wallsZ.length-1] - wallsZ[0]) * SCALE;

  // Front wall (+Z)
  let w = new THREE.Mesh(new THREE.BoxGeometry(extW, H, wallThick), murExtMat);
  w.position.set(0, floorY + H/2, toZ(wallsZ[wallsZ.length-1]));
  w.castShadow = true; w.receiveShadow = true;
  group.add(w);

  // Back wall (-Z)
  w = new THREE.Mesh(new THREE.BoxGeometry(extW, H, wallThick), murExtMat);
  w.position.set(0, floorY + H/2, toZ(wallsZ[0]));
  w.castShadow = true; w.receiveShadow = true;
  group.add(w);

  // Left wall (-X)
  w = new THREE.Mesh(new THREE.BoxGeometry(wallThick, H, extD), murExtMat);
  w.position.set(toX(wallsX[0]), floorY + H/2, 0);
  w.castShadow = true; w.receiveShadow = true;
  group.add(w);

  // Right wall (+X)
  w = new THREE.Mesh(new THREE.BoxGeometry(wallThick, H, extD), murExtMat);
  w.position.set(toX(wallsX[wallsX.length-1]), floorY + H/2, 0);
  w.castShadow = true; w.receiveShadow = true;
  group.add(w);

  // Interior vertical walls
  for (let i = 1; i < wallsX.length - 1; i++) {
    const x = wallsX[i];
    // Find which Z segments this wall spans
    let zStart = wallsZ[0];
    let zEnd = wallsZ[wallsZ.length-1];
    // A wall typically spans across all Z
    const wallLen = (zEnd - zStart) * SCALE;
    w = new THREE.Mesh(new THREE.BoxGeometry(wallThick, H, wallLen), murIntMat);
    w.position.set(toX(x), floorY + H/2, 0);
    w.castShadow = true;
    group.add(w);
  }

  // Interior horizontal walls
  for (let i = 1; i < wallsZ.length - 1; i++) {
    const z = wallsZ[i];
    let xStart = wallsX[0];
    let xEnd = wallsX[wallsX.length-1];
    const wallLen = (xEnd - xStart) * SCALE;
    w = new THREE.Mesh(new THREE.BoxGeometry(wallLen, H - 0.4, wallThick), murIntMat);
    w.position.set(0, floorY + H/2, toZ(z));
    // Leave gap at top for door openings
    w.castShadow = true;
    group.add(w);
  }

  // Floor slab
  const floor = new THREE.Mesh(new THREE.BoxGeometry(extW - 0.1, 0.1, extD - 0.1), solMat);
  floor.position.set(0, floorY, 0);
  floor.receiveShadow = true;
  group.add(floor);

  return group;
}

// Build floor 1 (ground floor)
const floor1 = buildWalls(wallsX_floor1, wallsZ_floor1, 0, true);
scene.add(floor1);

// Build floor 2 (first floor)
const floor2 = buildWalls(wallsX_floor2, wallsZ_floor2, HAUTEUR_ETAGE, false);
scene.add(floor2);

// Ceiling (top of floor 2)
const extD = (wallsZ_floor2[wallsZ_floor2.length-1] - wallsZ_floor2[0]) * SCALE;
const extW = (wallsX_floor2[wallsX_floor2.length-1] - wallsX_floor2[0]) * SCALE;
const ceiling = new THREE.Mesh(new THREE.BoxGeometry(extW - 0.1, 0.1, extD - 0.1), plafondMat);
ceiling.position.set(0, HAUTEUR_ETAGE * 2, 0);
scene.add(ceiling);

// ═══════════════════════════════════════════════
//  TOIT (simple toit à deux pentes)
// ═══════════════════════════════════════════════
const roofH = 1.5;

// Use a custom geometry for the pitched roof
function buildRoof() {
  const g = new THREE.Group();
  const w = extW + 0.5;
  const d = extD + 0.5;
  const peak = HAUTEUR_ETAGE * 2 + roofH;
  const base = HAUTEUR_ETAGE * 2;

  // Left slope
  const geo1 = new THREE.BufferGeometry();
  const v1 = new Float32Array([
    -w/2, base, -d/2,   0, peak, -d/2,   -w/2, base, d/2,
    -w/2, base, d/2,    0, peak, -d/2,   0, peak, d/2,
  ]);
  geo1.setAttribute('position', new THREE.BufferAttribute(v1, 3));
  geo1.computeVertexNormals();
  const roof1 = new THREE.Mesh(geo1, toitMat);
  roof1.castShadow = true;
  g.add(roof1);

  // Right slope
  const geo2 = new THREE.BufferGeometry();
  const v2 = new Float32Array([
    w/2, base, -d/2,    0, peak, -d/2,    w/2, base, d/2,
    w/2, base, d/2,     0, peak, -d/2,    0, peak, d/2,
  ]);
  geo2.setAttribute('position', new THREE.BufferAttribute(v2, 3));
  geo2.computeVertexNormals();
  const roof2 = new THREE.Mesh(geo2, toitMat);
  roof2.castShadow = true;
  g.add(roof2);

  // Gable ends (triangles)
  const gableMat = new THREE.MeshStandardMaterial({ color: 0xd4c9b8, roughness: 0.8, side: THREE.DoubleSide });
  const geo3 = new THREE.BufferGeometry();
  const v3 = new Float32Array([
    -w/2, base, -d/2,   0, peak, -d/2,   w/2, base, -d/2,
    -w/2, base, d/2,    0, peak, d/2,    w/2, base, d/2,
  ]);
  geo3.setAttribute('position', new THREE.BufferAttribute(v3, 3));
  geo3.computeVertexNormals();
  const gable1 = new THREE.Mesh(geo3, gableMat);
  gable1.position.z = -d/2;
  g.add(gable1);

  const gable2 = new THREE.Mesh(geo3.clone(), gableMat);
  gable2.position.z = d/2;
  g.add(gable2);

  return g;
}

const roof = buildRoof();
scene.add(roof);

// ═══════════════════════════════════════════════
//  FENÊTRES (façade avant)
// ═══════════════════════════════════════════════
function addWindow(x, y, z, w, h, facade) {
  const g = new THREE.Group();
  // Glass
  const glass = new THREE.Mesh(new THREE.PlaneGeometry(w * 0.8, h * 0.8), vitreMat);
  glass.position.z = facade ? 0.04 : -0.04;
  g.add(glass);
  // Frame
  const frameMat = cadreMat;
  // Horizontal bars
  const hBar = (x, y, w, h) => {
    const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.06), frameMat);
    b.position.set(x, y, 0);
    g.add(b);
  };
  hBar(0, h/2, w + 0.06, 0.04);
  hBar(0, -h/2, w + 0.06, 0.04);
  hBar(-w/2, 0, 0.04, h + 0.06);
  hBar(w/2, 0, 0.04, h + 0.06);
  // Cross
  hBar(0, 0, 0.03, h * 0.75);
  hBar(0, 0, w * 0.75, 0.03);

  g.position.set(x, y, z);
  return g;
}

// Windows on front facade (+Z)
const winW = 0.8, winH = 1.0;
const frontZ = (wallsZ_floor1[wallsZ_floor1.length-1]) * SCALE;

// Floor 1 windows
scene.add(addWindow(-1.5, 1.3, frontZ, winW, winH, true));
scene.add(addWindow(1.5, 1.3, frontZ, winW, winH, true));
scene.add(addWindow(0, 1.3, frontZ, 1.0, 1.2, true)); // large window center

// Floor 2 windows
scene.add(addWindow(-1.5, HAUTEUR_ETAGE + 1.3, frontZ, winW, winH, true));
scene.add(addWindow(1.5, HAUTEUR_ETAGE + 1.3, frontZ, winW, winH, true));
scene.add(addWindow(0, HAUTEUR_ETAGE + 1.3, frontZ, 0.9, 1.1, true));

// Door (center ground floor)
const door = new THREE.Mesh(new THREE.BoxGeometry(0.85, 2.1, 0.06), porteMat);
door.position.set(0, 1.05, frontZ);
scene.add(door);
const doorFrame = new THREE.Mesh(new THREE.BoxGeometry(0.90, 2.15, 0.08), cadreMat);
doorFrame.position.set(0, 1.075, frontZ - 0.02);
scene.add(doorFrame);

// ═══════════════════════════════════════════════
//  GARAGE (côté droit de la maison)
// ═══════════════════════════════════════════════
const garageMat = new THREE.MeshStandardMaterial({ color: 0xb8a890, roughness: 0.7 });
const garageDoorMat = new THREE.MeshStandardMaterial({ color: 0x8a7a6a, roughness: 0.5 });
const garageW = 2.5, garageD = 3, garageH = 2.5;
const garageX = extW/2 + garageW/2;

const garage = new THREE.Mesh(new THREE.BoxGeometry(garageW, garageH, garageD), garageMat);
garage.position.set(garageX, garageH/2, 0);
garage.castShadow = true;
garage.receiveShadow = true;
scene.add(garage);

// Garage door (opening)
const gDoor = new THREE.Mesh(new THREE.BoxGeometry(2.0, 2.0, 0.06), garageDoorMat);
gDoor.position.set(garageX, 1.0, garageD/2);
scene.add(gDoor);

// Remove front wall of garage (make opening)
const gDoorHole = new THREE.Mesh(new THREE.BoxGeometry(2.1, 2.1, 0.15), murExtMat);
gDoorHole.position.set(garageX, 1.05, garageD/2 - 0.05);
gDoorHole.scale.z = 0;
scene.add(gDoorHole);

// ═══════════════════════════════════════════════
//  TERRAIN + JARDIN
// ═══════════════════════════════════════════════
const terrain = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.MeshStandardMaterial({ color: 0x5a8a4a, roughness: 0.9 })
);
terrain.rotation.x = -Math.PI / 2;
terrain.position.set(0, -0.05, 0);
terrain.receiveShadow = true;
scene.add(terrain);

// Allée
const allee = new THREE.Mesh(
  new THREE.PlaneGeometry(1.5, 3),
  new THREE.MeshStandardMaterial({ color: 0x8a7a6a, roughness: 0.8 })
);
allee.rotation.x = -Math.PI / 2;
allee.position.set(0, 0.01, frontZ + 1.5);
scene.add(allee);

// ═══════════════════════════════════════════════
//  ÉCLAIRAGE
// ═══════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x5a8a4a, 0.4));

const sun = new THREE.DirectionalLight(0xffeedd, 1.5);
sun.position.set(10, 15, 5);
sun.target.position.set(0, 0, 0);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 40;
sun.shadow.camera.left = -15;
sun.shadow.camera.right = 15;
sun.shadow.camera.top = 15;
sun.shadow.camera.bottom = -15;
scene.add(sun);
scene.add(sun.target);

// Interior lights
function addRoomLight(x, y, z) {
  const light = new THREE.PointLight(0xffeedd, 0.5, 4);
  light.position.set(x, y, z);
  scene.add(light);
}

// Some room lights
addRoomLight(0, 1, -1);
addRoomLight(-1.5, 1, 1.5);
addRoomLight(1.5, 1, 1.5);
addRoomLight(0, HAUTEUR_ETAGE + 1, -1);
addRoomLight(-1.5, HAUTEUR_ETAGE + 1, 1.5);
addRoomLight(1.5, HAUTEUR_ETAGE + 1, 1.5);

// ═══════════════════════════════════════════════
//  ANIMATION
// ═══════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

console.log(`🏠 Maison 3D générée depuis les plans`);
console.log(`   Dimensions: ${EXTERIEUR_LARGEUR.toFixed(1)}m x ${EXTERIEUR_PROFONDEUR.toFixed(1)}m`);
console.log(`   2 étages + toit à deux pentes + garage`);
console.log(`   Utilise OrbitControls (clic droit pour panoramique, molette pour zoom)`);
</script>
</body>
</html>
