<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maison — Assets positionnés par template matching</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; }
    canvas { display: block; }
    #info {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.5); font-size: 14px; background: rgba(0,0,0,0.5);
      padding: 8px 18px; border-radius: 20px; pointer-events: none; user-select: none;
    }
  </style>
</head>
<body>
<div id="info">🖱️ <strong>Orbite</strong> | <strong>Molette</strong> zoom | Assets positionnés par matching</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const PLAN_W = 206; // px de mur à mur sur le plan
const HOUSE_M = 8.0;
const SCALE = HOUSE_M / PLAN_W;
const PLAN_H_PX = 272;
const DEPTH_M = PLAN_H_PX * SCALE;
const H_ETAGE = 2.7;
const CX = (22 + 228) / 2; // centre X du plan
const CZ = (36 + 308) / 2; // centre Z du plan

function pxToX(px) { return (px - CX) * SCALE; }
function pxToZ(py) { return (py - CZ) * SCALE + 0.5; }

// Assets trouvés par template matching
// Format: [nom, plan_x, plan_y, floor]
const assets = [
  // RDC (floor=0)
  ['baievitredouble', 74, 34, 0],
  ['baievitretriple', 38, 298, 0],
  ['baignoir', 162, 68, 0],
  ['canape3p', 54, 300, 0],
  ['douche90', 60, 74, 0],
  ['escalier', 176, 152, 0],
  ['escalier2', 152, 148, 0],
  ['evier', 154, 128, 0],
  ['frigo', 154, 126, 0],
  ['garage', 20, 120, 0],
  ['placard2p', 50, 274, 0],
  ['planTravail', 154, 40, 0],
  ['plaques', 58, 78, 0],
  ['porteGarage', 34, 300, 0],
  ['porteG', 120, 166, 0],
  ['porteD', 140, 46, 0],
  ['vasque', 122, 180, 0],
  ['table2ch', 38, 266, 0],
  ['terrasse2p', 120, 268, 0],
  ['toilet', 140, 180, 0],
  
  // 1er étage (floor=1)
  ['baievitredouble', 158, 32, 1],
  ['baievitretriple', 46, 28, 1],
  ['baignoir', 104, 148, 1],
  ['canape3p', 54, 32, 1],
  ['douche90', 104, 152, 1],
  ['escalier', 84, 148, 1],
  ['escalier2', 68, 150, 1],
  ['evier', 124, 264, 1],
  ['frigo', 132, 284, 1],
  ['garage', 40, 8, 1],
  ['placard2p', 28, 132, 1],
  ['planTravail', 66, 40, 1],
  ['plaques', 90, 156, 1],
  ['porteGarage', 44, 30, 1],
  ['porteG', 142, 122, 1],
  ['porteD', 110, 122, 1],
  ['vasque', 140, 174, 1],
  ['table2ch', 166, 264, 1],
  ['terrasse2p', 32, 36, 1],
  ['toilet', 48, 206, 1],
];

// ═══════════════════════════════════════════════
//  SCÈNE
// ═══════════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 15, 30);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(6, 5, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, H_ETAGE, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.minDistance = 2;
controls.maxDistance = 20;
controls.update();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════════
//  MATÉRIAUX
// ═══════════════════════════════════════════════
const mur = new THREE.MeshStandardMaterial({ color: 0xd4c9b8, roughness: 0.7 });
const murInt = new THREE.MeshStandardMaterial({ color: 0xf0e8d8, roughness: 0.8, side: THREE.DoubleSide });
const solRDC = new THREE.MeshStandardMaterial({ color: 0xc9b8a5, roughness: 0.7 });
const solEtage = new THREE.MeshStandardMaterial({ color: 0xe0d8c8, roughness: 0.7 });
const blanc = new THREE.MeshStandardMaterial({ color: 0xf2efe8, roughness: 0.9 });
const vitre = new THREE.MeshStandardMaterial({ color: 0x87ceeb, roughness: 0.05, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
const noir = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5 });
const bois = new THREE.MeshStandardMaterial({ color: 0x8a7a5a, roughness: 0.6 });
const tissu = new THREE.MeshStandardMaterial({ color: 0x6a5a4a, roughness: 0.8 });
const blancMat = new THREE.MeshStandardMaterial({ color: 0xe8e0d0, roughness: 0.5 });
const metal = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.7 });
const rouge = new THREE.MeshStandardMaterial({ color: 0x8a2a1a, roughness: 0.7 });

function box(w, h, d, mat, x, y, z, cs = true, rs = true) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  if (cs) m.castShadow = true;
  if (rs) m.receiveShadow = true;
  scene.add(m);
  return m;
}

// ═══════════════════════════════════════════════
//  COQUE DU BÂTIMENT
// ═══════════════════════════════════════════════
const MUR = 0.12;
// Sols
box(HOUSE_M - 0.1, 0.1, DEPTH_M - 0.1, solRDC, 0, 0.05, 0.5);
box(HOUSE_M - 0.1, 0.1, DEPTH_M - 0.1, solEtage, 0, H_ETAGE + 0.05, 0.5);
// Murs extérieurs
box(HOUSE_M, H_ETAGE * 2, MUR, mur, 0, H_ETAGE, DEPTH_M);
box(HOUSE_M, H_ETAGE * 2, MUR, mur, 0, H_ETAGE, 0);
box(MUR, H_ETAGE * 2, DEPTH_M, mur, -HOUSE_M/2, H_ETAGE, 0.5);
box(MUR + 0.5, H_ETAGE * 2 + 0.5, DEPTH_M + 0.5, mur, HOUSE_M/2 + 0.25, H_ETAGE, 0.5);
// Plafond
box(HOUSE_M - 0.1, 0.1, DEPTH_M - 0.1, blanc, 0, H_ETAGE * 2, 0.5);

// ═══════════════════════════════════════════════
//  ASSETS 3D
// ═══════════════════════════════════════════════

function createAsset(type, x, z, floor) {
  const yBase = floor * H_ETAGE;
  const S = SCALE * 2; // scale factor for asset size
  
  switch(type) {
    case 'canape3p': // Canapé 3 places
      box(1.8 * S, 0.5, 0.7 * S, tissu, x, yBase + 0.25, z);
      box(1.8 * S, 0.3, 0.15 * S, tissu, x, yBase + 0.55, z - 0.3 * S);
      break;
    case 'table2ch': // Table + 2 chaises
      box(0.7 * S, 0.7, 0.5 * S, bois, x, yBase + 0.35, z);
      box(0.3 * S, 0.4, 0.3 * S, bois, x - 0.5 * S, yBase + 0.2, z);
      box(0.3 * S, 0.4, 0.3 * S, bois, x + 0.5 * S, yBase + 0.2, z);
      break;
    case 'baignoir': // Baignoire
      box(0.7 * S, 0.4, 1.5 * S, blancMat, x, yBase + 0.2, z);
      box(0.6 * S, 0.15, 1.4 * S, new THREE.MeshStandardMaterial({ color: 0x88ccff, roughness: 0.1, transparent: true, opacity: 0.5 }), x, yBase + 0.4, z);
      break;
    case 'douche90': // Douche 90x90
      box(0.9 * S, 0.05, 0.9 * S, blancMat, x, yBase + 0.025, z);
      // Parois
      box(0.02, 0.8, 0.9 * S, vitre, x - 0.45 * S, yBase + 0.4, z);
      box(0.9 * S, 0.8, 0.02, vitre, x, yBase + 0.4, z - 0.45 * S);
      box(0.9 * S, 0.8, 0.02, vitre, x, yBase + 0.4, z + 0.45 * S);
      break;
    case 'toilet': // WC
      box(0.35 * S, 0.4, 0.5 * S, blancMat, x, yBase + 0.2, z);
      box(0.15 * S, 0.25, 0.15 * S, blancMat, x, yBase + 0.45, z + 0.15 * S);
      break;
    case 'vasque': // Lavabo simple
      box(0.5 * S, 0.75, 0.5 * S, blancMat, x, yBase + 0.375, z);
      box(0.35 * S, 0.1, 0.35 * S, new THREE.MeshStandardMaterial({ color: 0x88ccff, roughness: 0.1 }), x, yBase + 0.4, z);
      break;
    case 'evier': // Évier cuisine
      box(0.5 * S, 0.75, 0.4 * S, metal, x, yBase + 0.375, z);
      box(0.4 * S, 0.1, 0.3 * S, blancMat, x, yBase + 0.4, z);
      break;
    case 'frigo': // Frigo américain
      box(0.5 * S, 1.5, 0.6 * S, metal, x, yBase + 0.75, z);
      box(0.48 * S, 0.02, 0.58 * S, noir, x, yBase + 0.75, z);
      break;
    case 'plaques': // Plaques cuisson
      box(0.4 * S, 0.05, 0.5 * S, noir, x, yBase + 0.025, z);
      break;
    case 'planTravail': // Plan de travail
      box(2.0 * S, 0.75, 0.6 * S, bois, x, yBase + 0.375, z);
      box(2.0 * S, 0.05, 0.6 * S, metal, x, yBase + 0.75, z);
      break;
    case 'baievitredouble': // Baie vitrée double
      box(1.2 * S, 1.8, 0.05, vitre, x, yBase + 0.9, z);
      box(0.04, 1.8, 0.06, noir, x - 0.6 * S, yBase + 0.9, z);
      box(0.04, 1.8, 0.06, noir, x + 0.6 * S, yBase + 0.9, z);
      box(1.2 * S, 0.04, 0.06, noir, x, yBase + 1.8, z);
      break;
    case 'baievitretriple': // Baie vitrée triple
      box(1.8 * S, 1.8, 0.05, vitre, x, yBase + 0.9, z);
      box(0.04, 1.8, 0.06, noir, x - 0.9 * S, yBase + 0.9, z);
      box(0.04, 1.8, 0.06, noir, x, yBase + 0.9, z);
      box(0.04, 1.8, 0.06, noir, x + 0.9 * S, yBase + 0.9, z);
      box(1.8 * S, 0.04, 0.06, noir, x, yBase + 1.8, z);
      break;
    case 'porteG': // Porte ouvrante gauche
      box(0.04, 1.8, 0.6 * S, bois, x, yBase + 0.9, z);
      break;
    case 'porteD': // Porte ouvrante droite
      box(0.04, 1.8, 0.6 * S, bois, x, yBase + 0.9, z);
      break;
    case 'escalier': // Escalier
      for (let i = 0; i < 10; i++) {
        box(0.3 * S, 0.05 + i * 0.04, 0.8 * S, bois, x + i * 0.1 * S, yBase + 0.025 + i * 0.04, z);
      }
      break;
    case 'escalier2': // Escalier 2
      for (let i = 0; i < 12; i++) {
        box(0.8 * S, 0.04 + i * 0.035, 0.3 * S, bois, x, yBase + 0.02 + i * 0.035, z + i * 0.1 * S);
      }
      break;
    case 'placard2p': // Placard 2 portes
      box(0.8 * S, 2.0, 0.5 * S, bois, x, yBase + 1.0, z);
      box(0.02, 1.8, 0.48 * S, noir, x - 0.2 * S, yBase + 0.95, z);
      box(0.02, 1.8, 0.48 * S, noir, x + 0.2 * S, yBase + 0.95, z);
      break;
    case 'garage': // Garage classique
      box(2.0 * S, 2.0, 2.5 * S, new THREE.MeshStandardMaterial({ color: 0x8a7a6a, roughness: 0.5 }), x, yBase + 1.0, z);
      break;
    case 'porteGarage': // Porte garage
      box(2.0 * S, 1.8, 0.04, new THREE.MeshStandardMaterial({ color: 0x6a5a4a, roughness: 0.4 }), x, yBase + 0.9, z);
      break;
    case 'terrasse2p': // Terrasse 2 piliers
      box(2.0 * S, 0.1, 1.5 * S, new THREE.MeshStandardMaterial({ color: 0xb8a890, roughness: 0.6 }), x, yBase + 0.05, z);
      box(0.15 * S, 2.0, 0.15 * S, mur, x - 0.9 * S, yBase + 1.0, z - 0.6 * S);
      box(0.15 * S, 2.0, 0.15 * S, mur, x + 0.9 * S, yBase + 1.0, z - 0.6 * S);
      break;
  }
}

// Placer tous les assets
assets.forEach(([type, px, pz, floor]) => {
  const x3d = pxToX(px);
  const z3d = pxToZ(pz);
  createAsset(type, x3d, z3d, floor);
});

// ═══════════════════════════════════════════════
//  TERRAIN + ÉCLAIRAGE
// ═══════════════════════════════════════════════
box(25, 0.02, 20, new THREE.MeshStandardMaterial({ color: 0x5a8a4a, roughness: 0.9 }), 0, -0.01, 0.5, false, true);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x5a8a4a, 0.4));

const soleil = new THREE.DirectionalLight(0xffeedd, 1.5);
soleil.position.set(8, 10, 6);
soleil.target.position.set(0, 0, 0);
soleil.castShadow = true;
soleil.shadow.mapSize.width = 2048;
soleil.shadow.mapSize.height = 2048;
soleil.shadow.camera.near = 0.5;
soleil.shadow.camera.far = 30;
soleil.shadow.camera.left = -12;
soleil.shadow.camera.right = 12;
soleil.shadow.camera.top = 10;
soleil.shadow.camera.bottom = -5;
scene.add(soleil);
scene.add(soleil.target);

// Lumières intérieures
for (let f = 0; f < 2; f++) {
  for (let i = 0; i < 4; i++) {
    const l = new THREE.PointLight(0xffeedd, 0.15, 3);
    l.position.set(-2 + i * 1.3, f * H_ETAGE + 2.5, 2);
    scene.add(l);
  }
}

// ═══════════════════════════════════════════════
//  ANIMATION
// ═══════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

console.log(`🏠 ${assets.length} assets positionnés par template matching`);
console.log(`   RDC: ${assets.filter(a => a[3] === 0).length} éléments`);
console.log(`   1er: ${assets.filter(a => a[3] === 1).length} éléments`);
console.log(`   ${20} types d'assets 3D différents`);
console.log(`   Styles: canapé, table, baignoire, douche, WC, vasque,`);
console.log(`   évier, frigo, plaques, plan travail, baies vitrées,`);
console.log(`   portes, escaliers, placard, garage, terrasse`);
</script>
</body>
</html>
