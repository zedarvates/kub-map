<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maison Moderne — Reconstruction 3D</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; }
    canvas { display: block; }
    #info {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.5); font-size: 14px; background: rgba(0,0,0,0.4);
      padding: 8px 18px; border-radius: 20px; pointer-events: none; user-select: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div id="info">🖱️ <strong>Glisser</strong> pour orbiter | <strong>Molette</strong> zoom</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════
//  DIMENSIONS (basées sur analyse EXT + plans)
// ═══════════════════════════════════════════════
// Plan: 206px = 8m → échelle 1px ≈ 0.039m
const M = 0.039; // mètres par pixel

// Maison (d'après plan RDC)
const L = 206 * M;  // 8.0m largeur
const P = 272 * M;  // 10.6m profondeur
const H_ETAGE = 2.7;
const NB_ETAGES = 2;

// Garage (d'après EXT: ~119px)
const G_L = 119 * M;  // ~4.6m
const G_P = 200 * M;  // ~7.8m
const G_H = H_ETAGE;

// Toit pentu (d'après EXT: pente ~71° côté gauche, plus plat côté droit)
const TOIT_HAUTEUR = 2.0;

// Décalage pour centrer
const CX = 0; // centre X
const CZ = 0; // centre Z

// ═══════════════════════════════════════════════
//  SCÈNE / RENDU
// ═══════════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 20, 40);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(8, 6, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.minDistance = 3;
controls.maxDistance = 30;
controls.update();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════════
//  MATÉRIAUX
// ═══════════════════════════════════════════════
const facade = new THREE.MeshStandardMaterial({ color: 0xe8ddd0, roughness: 0.7 }); // beige clair moderne
const facadeSombre = new THREE.MeshStandardMaterial({ color: 0xc8b8a0, roughness: 0.7 });
const toitMat = new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 0.6 }); // ardoise foncée
const solMat = new THREE.MeshStandardMaterial({ color: 0x5a8a4a, roughness: 0.9 });
const alleeMat = new THREE.MeshStandardMaterial({ color: 0x8a7a6a, roughness: 0.8 });
const vitre = new THREE.MeshStandardMaterial({ color: 0x87ceeb, roughness: 0.05, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
const cadre = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5 }); // cadre fenêtre noir (moderne)
const porteMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.3 }); // porte moderne noire
const garageMat = new THREE.MeshStandardMaterial({ color: 0x6a5a4a, roughness: 0.5 });
const garagePorte = new THREE.MeshStandardMaterial({ color: 0x8a7a6a, roughness: 0.4 });

// Helper: boîte primitive
function box(w, h, d, mat, x, y, z, castShadow = true, receiveShadow = true) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  if (castShadow) m.castShadow = true;
  if (receiveShadow) m.receiveShadow = true;
  scene.add(m);
  return m;
}

// ═══════════════════════════════════════════════
//  MAISON — Volume principal
// ═══════════════════════════════════════════════
const SOL = 0;

// Murs extérieurs (4 faces)
const MUR_EP = 0.15;

// Mur avant (+Z)
box(L, H_ETAGE * NB_ETAGES, MUR_EP, facade, 0, H_ETAGE * NB_ETAGES/2, P/2 - MUR_EP/2);
// Mur arrière (-Z)
box(L, H_ETAGE * NB_ETAGES, MUR_EP, facade, 0, H_ETAGE * NB_ETAGES/2, -P/2 + MUR_EP/2);
// Mur gauche (-X)
box(MUR_EP, H_ETAGE * NB_ETAGES, P, facade, -L/2 + MUR_EP/2, H_ETAGE * NB_ETAGES/2, 0);
// Mur droit (+X) — partagé avec garage, on le met plus tard

// Plancher RDC
box(L - 0.1, 0.1, P - 0.1, solMat, 0, 0.05, 0, false, true);

// Plancher 1er étage
box(L - 0.1, 0.1, P - 0.1, new THREE.MeshStandardMaterial({ color: 0xf2efe8, roughness: 0.9 }), 0, H_ETAGE, 0, false, true);

// ═══════════════════════════════════════════════
//  FENÊTRES (façade avant, style moderne)
// ═══════════════════════════════════════════════
const WIN_W = 1.0, WIN_H = 1.3;
const Z_FEN = P/2 + 0.02;

function fenetre(x, y, w, h) {
  // Vitre
  box(w * 0.85, h * 0.85, 0.02, vitre, x, y, Z_FEN, false, false);
  // Cadre noir fin
  box(w + 0.06, 0.03, 0.04, cadre, x, y + h/2, Z_FEN, false, false);
  box(w + 0.06, 0.03, 0.04, cadre, x, y - h/2, Z_FEN, false, false);
  box(0.03, h + 0.06, 0.04, cadre, x - w/2, y, Z_FEN, false, false);
  box(0.03, h + 0.06, 0.04, cadre, x + w/2, y, Z_FEN, false, false);
  // Croisillons
  box(0.02, h * 0.7, 0.03, cadre, x, y, Z_FEN, false, false);
  box(w * 0.7, 0.02, 0.03, cadre, x, y, Z_FEN, false, false);
}

// RDC — 3 fenêtres
fenetre(-L/4, 1.5, WIN_W, WIN_H);
fenetre(L/4, 1.5, WIN_W, WIN_H);
// Grande fenêtre centrale (baie vitrée)
fenetre(0, 1.5, 1.8, 1.8);

// 1er étage — 3 fenêtres alignées
fenetre(-L/4, H_ETAGE + 1.5, WIN_W, WIN_H);
fenetre(L/4, H_ETAGE + 1.5, WIN_W, WIN_H);
fenetre(0, H_ETAGE + 1.5, WIN_W * 0.9, WIN_H);

// ═══════════════════════════════════════════════
//  PORTE D'ENTRÉE (moderne, noire)
// ═══════════════════════════════════════════════
const PORTE_L = 0.9, PORTE_H = 2.2;
const Z_PORTE = P/2 + 0.02;

// Porte
box(PORTE_L, PORTE_H, 0.05, porteMat, 0, PORTE_H/2, Z_PORTE, false, false);
// Cadre porte noir
box(PORTE_L + 0.08, 0.04, 0.06, cadre, 0, PORTE_H + 0.02, Z_PORTE, false, false);
box(0.04, PORTE_H + 0.04, 0.06, cadre, -PORTE_L/2 - 0.02, PORTE_H/2, Z_PORTE, false, false);
box(0.04, PORTE_H + 0.04, 0.06, cadre, PORTE_L/2 + 0.02, PORTE_H/2, Z_PORTE, false, false);
// Poignée
box(0.02, 0.4, 0.04, new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.8 }), PORTE_L/2 - 0.08, 1.0, Z_PORTE + 0.03, false, false);

// ═══════════════════════════════════════════════
//  GARAGE (côté droit)
// ═══════════════════════════════════════════════
const GARAGE_X = L/2 + G_L/2 + 0.1;

// Volume garage
box(G_L, G_H, G_P, facadeSombre, GARAGE_X, G_H/2, 0);

// Mur entre maison et garage (mitoyen)
box(MUR_EP + 0.05, H_ETAGE * NB_ETAGES + G_H, 0.1, facade, L/2, (H_ETAGE * NB_ETAGES)/2, 0, false, true);

// Porte de garage (sectionnelle, moderne)
const G_PORTE_L = 2.2, G_PORTE_H = 2.0;
const Z_GARAGE = G_P/2 + 0.02;

// Fond sombre de la porte
box(G_PORTE_L, G_PORTE_H, 0.04, garagePorte, GARAGE_X, G_PORTE_H/2, Z_GARAGE, false, false);
// Panneaux horizontaux (décoration porte sectionnelle)
for (let i = 0; i < 4; i++) {
  const yy = 0.3 + i * 0.5;
  box(G_PORTE_L - 0.2, 0.02, 0.05, new THREE.MeshStandardMaterial({ color: 0x5a4a3a, roughness: 0.3 }), GARAGE_X, yy, Z_GARAGE + 0.02, false, false);
}
// Cadre
box(G_PORTE_L + 0.1, 0.04, 0.06, cadre, GARAGE_X, G_PORTE_H + 0.02, Z_GARAGE, false, false);
box(0.04, G_PORTE_H + 0.04, 0.06, cadre, GARAGE_X - G_PORTE_L/2 - 0.02, G_PORTE_H/2, Z_GARAGE, false, false);
box(0.04, G_PORTE_H + 0.04, 0.06, cadre, GARAGE_X + G_PORTE_L/2 + 0.02, G_PORTE_H/2, Z_GARAGE, false, false);

// Fenêtre garage (petite, côté)
box(0.5, 0.5, 0.02, vitre, GARAGE_X, 1.8, -G_P/2 + 0.05, false, false);

// ═══════════════════════════════════════════════
//  TOIT (pentu asymétrique, style moderne)
// ═══════════════════════════════════════════════
// Toit à deux pentes : point culminant décalé (asymétrique)
const TOIT_PIC = H_ETAGE * NB_ETAGES + TOIT_HAUTEUR;
const TOIT_BASE = H_ETAGE * NB_ETAGES;
const DECALAGE_PIC = 0.3; // pic légèrement décalé pour asymétrie

// Face avant du toit (pignon avant)
const gableShape = new THREE.Shape();
gableShape.moveTo(-L/2, TOIT_BASE);
gableShape.lineTo(L/2, TOIT_BASE);
gableShape.lineTo(L/2 - DECALAGE_PIC, TOIT_PIC);
gableShape.lineTo(-L/2 - DECALAGE_PIC, TOIT_PIC);
gableShape.closePath();

const extrudeSettings = { depth: 0.05, bevelEnabled: false };
const gableGeo = new THREE.ExtrudeGeometry(gableShape, extrudeSettings);
const gableFront = new THREE.Mesh(gableGeo, toitMat);
gableFront.position.set(0, 0, P/2 - 0.01);
gableFront.rotation.y = Math.PI;
scene.add(gableFront);

const gableBack = gableFront.clone();
gableBack.position.set(0, 0, -P/2 + 0.01);
scene.add(gableBack);

// Versants du toit (2 pentes)
// Pente avant → arrière (charpente)
function makeRoofSlope(x1, z1, x2, z2, height, flipNormal) {
  const geo = new THREE.BufferGeometry();
  const base = TOIT_BASE;
  const peak = TOIT_PIC;
  const verts = new Float32Array([
    x1, base, z1,
    x2, base, z2,
    x1, peak, z1 + 1,
    x2, base, z2,
    x2, peak, z2 + 1,
    x1, peak, z1 + 1,
  ]);
  geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, toitMat);
  mesh.castShadow = true;
  mesh.position.y += height;
  if (flipNormal) mesh.geometry = geo.clone();
  scene.add(mesh);
}

// Simplification: toit fait de deux grands triangles extrudés
// Pente gauche (plus pentue = plus haute)
const rH = TOIT_HAUTEUR;
const rPeakX = DECALAGE_PIC;

// Pente avant gauche
const roofGeo1 = new THREE.BufferGeometry();
const rv1 = new Float32Array([
  -L/2, TOIT_BASE, -P/2,
  rPeakX, TOIT_PIC, -P/2,
  -L/2, TOIT_BASE, P/2,
  -L/2, TOIT_BASE, P/2,
  rPeakX, TOIT_PIC, -P/2,
  rPeakX, TOIT_PIC, P/2,
]);
roofGeo1.setAttribute('position', new THREE.BufferAttribute(rv1, 3));
roofGeo1.computeVertexNormals();
const r1 = new THREE.Mesh(roofGeo1, toitMat);
r1.castShadow = true;
scene.add(r1);

// Pente avant droite
const roofGeo2 = new THREE.BufferGeometry();
const rv2 = new Float32Array([
  L/2, TOIT_BASE, -P/2,
  rPeakX, TOIT_PIC, -P/2,
  L/2, TOIT_BASE, P/2,
  L/2, TOIT_BASE, P/2,
  rPeakX, TOIT_PIC, -P/2,
  rPeakX, TOIT_PIC, P/2,
]);
roofGeo2.setAttribute('position', new THREE.BufferAttribute(rv2, 3));
roofGeo2.computeVertexNormals();
const r2 = new THREE.Mesh(roofGeo2, toitMat);
r2.castShadow = true;
scene.add(r2);

// Débord de toit (légère avancée)
box(L + 0.4, 0.03, 0.15, toitMat, 0, TOIT_BASE, P/2 + 0.05, true, false);
box(L + 0.4, 0.03, 0.15, toitMat, 0, TOIT_BASE, -P/2 - 0.05, true, false);

// ═══════════════════════════════════════════════
//  CLÔTURE / TERRASSE / ALLÉE
// ═══════════════════════════════════════════════
const terrain = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 25),
  solMat
);
terrain.rotation.x = -Math.PI / 2;
terrain.position.set(0, -0.02, 0);
terrain.receiveShadow = true;
scene.add(terrain);

// Allée voiture (devant garage)
box(3, 0.05, 6, alleeMat, GARAGE_X, 0.01, 5, false, true);

// Allée piétonne (porte d'entrée)
box(1.2, 0.05, 3, alleeMat, 0, 0.01, P/2 + 2, false, true);

// Terrasse (derrière la maison)
box(L * 0.6, 0.08, 2, new THREE.MeshStandardMaterial({ color: 0xb8a890, roughness: 0.6 }), 0, 0.04, -P/2 - 1, false, true);

// ═══════════════════════════════════════════════
//  ÉCLAIRAGE
// ═══════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x5a8a4a, 0.5));

const soleil = new THREE.DirectionalLight(0xffeedd, 1.8);
soleil.position.set(10, 12, 8);
soleil.target.position.set(0, 0, 0);
soleil.castShadow = true;
soleil.shadow.mapSize.width = 2048;
soleil.shadow.mapSize.height = 2048;
soleil.shadow.camera.near = 0.5;
soleil.shadow.camera.far = 40;
soleil.shadow.camera.left = -15;
soleil.shadow.camera.right = 15;
soleil.shadow.camera.top = 15;
soleil.shadow.camera.bottom = -15;
scene.add(soleil);
scene.add(soleil.target);

// Lumières intérieures (visibles la nuit)
function lampe(x, y, z) {
  const l = new THREE.PointLight(0xffeedd, 0.3, 5);
  l.position.set(x, y, z);
  scene.add(l);
  // Petit point lumineux décoratif
  box(0.04, 0.04, 0.04, new THREE.MeshStandardMaterial({ color: 0xffeecc, emissive: 0xffeecc, emissiveIntensity: 0.5 }), x, y, z, false, false);
}
lampe(0, 2.5, 0);
lampe(-L/4, 2.5, 0);
lampe(L/4, 2.5, 0);
lampe(0, H_ETAGE + 2.5, 0);
lampe(-L/4, H_ETAGE + 2.5, 0);
lampe(L/4, H_ETAGE + 2.5, 0);

// ═══════════════════════════════════════════════
//  ANIMATION
// ═══════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

console.log(`🏠 Maison Moderne — Reconstruction 3D`);
console.log(`   Maison: ${L.toFixed(1)}m x ${P.toFixed(1)}m, ${NB_ETAGES} étages`);
console.log(`   Garage: ${G_L.toFixed(1)}m x ${G_P.toFixed(1)}m`);
console.log(`   Toit: pentu asymétrique, hauteur ${TOIT_HAUTEUR}m`);
console.log(`   ${3+3+1} fenêtres + porte moderne + porte garage sectionnelle`);
console.log(`   Orbite libre — glisser pour tourner autour`);
</script>
</body>
</html>
